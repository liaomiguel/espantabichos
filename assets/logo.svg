<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Waves -->
  <path d="M40 70 Q 20 100 40 130" stroke="#00D4FF" stroke-width="4" stroke-linecap="round" filter="url(#glow)" opacity="0.4"/>
  <path d="M30 60 Q 5 100 30 140" stroke="#00D4FF" stroke-width="4" stroke-linecap="round" filter="url(#glow)" opacity="0.2"/>
  
  <path d="M160 70 Q 180 100 160 130" stroke="#00D4FF" stroke-width="4" stroke-linecap="round" filter="url(#glow)" opacity="0.4"/>
  <path d="M170 60 Q 195 100 170 140" stroke="#00D4FF" stroke-width="4" stroke-linecap="round" filter="url(#glow)" opacity="0.2"/>

  <!-- Shield -->
  <path d="M100 30 C 130 30 150 40 150 60 C 150 110 130 150 100 170 C 70 150 50 110 50 60 C 50 40 70 30 100 30Z" stroke="#00D4FF" stroke-width="6" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Diagonal Bar -->
  <line x1="70" y1="60" x2="130" y2="140" stroke="#00D4FF" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Interior Waves -->
  <circle cx="100" cy="85" r="3" fill="#00D4FF" filter="url(#glow)"/>
  <path d="M85 75 Q 100 65 115 75" stroke="#00D4FF" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M75 65 Q 100 50 125 65" stroke="#00D4FF" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Rat Silhouette (Abstract) -->
  <path d="M75 110 C 65 110 60 120 70 140 C 80 150 90 145 95 135" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="72" cy="118" r="2" fill="black" />

  <!-- Bug Silhouette (Abstract) -->
  <path d="M125 105 L 115 115 L 125 125 L 135 115 Z" fill="#00D4FF" filter="url(#glow)"/>
  <path d="M115 110 L 105 105" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <path d="M115 120 L 105 125" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <path d="M135 110 L 145 105" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <path d="M135 120 L 145 125" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
</svg>
